server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    location ~* \.(css|js|jpg|jpeg|png|gif|svg|ico|woff2|pdf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
